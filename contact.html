<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oceane Productions — contact</title>
<meta name="description" content="Get in touch with Oceane Productions.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap">
<link rel="stylesheet" href="styles.css">
<style>
.op-contact{min-height:100vh;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:0 clamp(20px,4vw,56px);background:#141310;position:relative;overflow:hidden}
.op-contact-dotgrid{position:absolute;inset:0;background-image:radial-gradient(rgba(255,252,249,.22) 1.5px,transparent 1.5px);background-size:24px 24px;pointer-events:none}
.op-contact-tag{position:relative;display:flex;align-items:center;gap:10px;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,252,249,.55);margin-bottom:24px}
.op-contact-dot{width:8px;height:8px;border-radius:50%;background:#89a7bb;display:inline-block;animation:opPulse 1.6s ease-in-out infinite}
.op-contact h1{position:relative;font-family:'DM Serif Display',serif;font-weight:400;font-size:clamp(48px,7vw,112px);line-height:1;color:#fffcf9;margin:0 0 40px;max-width:1200px}
.op-contact-email{position:relative;display:inline-flex;align-items:center;gap:16px;font-family:'DM Serif Display',serif;font-weight:400;font-size:clamp(24px,3vw,48px);color:#82abcc;text-decoration:none;border-bottom:1px solid rgba(130,171,204,.3);padding-bottom:8px;transition:color .2s,border-color .2s}
.op-contact-email:hover{color:#fffcf9;border-color:rgba(255,252,249,.4)}
.op-contact-back{position:relative;margin-top:56px;display:inline-flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,252,249,.45);transition:color .2s}
.op-contact-back:hover{color:#fffcf9}
</style>
</head>
<body>

<header class="op-header" id="op-header">
  <a href="index.html"><img src="assets/logo-offwhite.png" alt="Oceane Productions"></a>
  <button id="op-lang-toggle" class="op-lang-btn">IS</button>
</header>

<main class="op-contact">
  <div class="op-contact-dotgrid"></div>
  <div class="op-contact-tag"><span class="op-contact-dot"></span><span data-i18n="contact_tag">get in touch</span></div>
  <h1 data-i18n="contact_h1">Let's make<br>something.</h1>
  <a class="op-contact-email" href="mailto:hlynur@oceane.is">hlynur@oceane.is</a>
  <a class="op-contact-back" href="index.html" data-i18n="contact_back">&larr; back to work</a>
</main>

<script src="script.js"></script>
<script src="i18n.js"></script>
</body>
</html>
