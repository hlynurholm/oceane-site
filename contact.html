<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oceane Productions — contact</title>
<meta name="description" content="Get in touch with Oceane Productions.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png">
<link rel="stylesheet" href="styles.css">
<style>
.op-contact{min-height:100vh;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:0 clamp(20px,4vw,56px);background:#141310;position:relative;overflow:hidden}
.op-contact-tag{position:relative;z-index:6;display:flex;align-items:center;gap:10px;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,252,249,.55);margin-bottom:24px}
.op-contact-dot{width:8px;height:8px;border-radius:50%;background:#89a7bb;display:inline-block;animation:opPulse 1.6s ease-in-out infinite}
.op-contact h1{position:relative;z-index:6;font-family:'DM Serif Display',serif;font-weight:400;font-size:clamp(48px,7vw,112px);line-height:1;color:#fffcf9;margin:0 0 40px;max-width:1200px}
.op-contact-email{position:relative;z-index:6;display:inline-flex;align-items:center;gap:16px;font-family:'DM Serif Display',serif;font-weight:400;font-size:clamp(24px,3vw,48px);color:#82abcc;text-decoration:none;border-bottom:1px solid rgba(130,171,204,.3);padding-bottom:8px;transition:color .2s,border-color .2s}
.op-contact-email:hover{color:#fffcf9;border-color:rgba(255,252,249,.4)}
.op-contact-back{position:relative;z-index:6;margin-top:56px;display:inline-flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,252,249,.45);transition:color .2s}
.op-contact-back:hover{color:#fffcf9}
</style>
</head>
<body>

<header class="op-header" id="op-header">
  <a href="index.html"><img src="assets/logo-offwhite.png" alt="Oceane Productions"></a>
  <div class="op-header-right">
    <button id="op-lang-toggle" class="op-lang-btn">IS</button>
    <div class="op-header-nav">
      <a class="op-nav-link" href="index.html" data-i18n="nav_home">home</a>
      <a class="op-nav-link" href="about.html" data-i18n="nav_about">about</a>
      <a class="op-nav-link op-nav-active" href="contact.html" data-i18n="nav_contact">contact</a>
    </div>
  </div>
</header>

<main class="op-contact" id="op-contact-root">
  <div class="op-contact-tag"><span class="op-contact-dot"></span><span data-page-field="tag">get in touch</span></div>
  <h1 data-page-field="h1">Let's make something.</h1>
  <a class="op-contact-email" href="mailto:hlynur@oceane.is">hlynur@oceane.is</a>
  <a class="op-contact-back" href="index.html" data-page-field="back">← back to work</a>
</main>

<script src="script.js"></script>
<script src="i18n.js"></script>
<script>
(function () {
  function opContactField(c, key) {
    if (window.opLang === 'is' && c[key + '_is']) return c[key + '_is'];
    return c[key] || '';
  }
  function opRenderContact(pages) {
    window.__opPagesCache = pages;
    var c = pages.contact || {};
    document.querySelectorAll('[data-page-field]').forEach(function (el) {
      el.textContent = opContactField(c, el.dataset.pageField);
    });
    var toggle = document.getElementById('op-lang-toggle');
    if (toggle) toggle.textContent = window.opLang === 'is' ? 'EN' : 'IS';
  }
  window.opLoadPages = function () {
    if (window.__opPagesOverride) return Promise.resolve(window.__opPagesOverride);
    if (window.__opPagesCache)    return Promise.resolve(window.__opPagesCache);
    return fetch('data/pages.json?v=' + Date.now()).then(function (r) { return r.json(); });
  };
  window.opRefreshContact = function () {
    window.opLoadPages().then(opRenderContact);
  };
  // Re-render when lang switches
  var _orig = window.opSetLang;
  window.opSetLang = function (lang) {
    if (_orig) _orig(lang);
    window.opRefreshContact();
  };
  window.opRefreshContact();
})();
</script>
</body>
</html>
